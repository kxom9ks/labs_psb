---
- name: Search info
  hosts: debian_hosts
  become: yes

  tasks:
    - name: All info
      ansible.builtin.debug:
        msg:
        - "Информация о ПК"
        - "______________________"
        - "Хост:  {{ ansible_hostname }} "
        - "FQDN:  {{ ansible_fqdn }} "
        - "Версия:  {{ ansible_version.full }} "
        - "Конфиг:  {{ ansible_config_file }} "
        - "Дата/время:  {{ ansible_date_time.date }}/{{ ansible_date_time.time }} "
        - "Пользователь:  {{ ansible_user }} "
        - "Версия ОС:  {{ ansible_distribution }} {{ ansible_distribution_version }} {{ ansible_distribution_release }} "
        - "Семейство ОС:  {{ ansible_os_family }} "
        - "RAM:  {{ ansible_memtotal_mb }} "
        - "IP Адрес:  {{ ansible_all_ipv4_addresses }} "
        - "Время работы:  {{ ansible_uptime_seconds // 86400 }} дней {{ ansible_uptime_seconds % 86400 // 3600 }} часа/ов {{ ansible_uptime_seconds % 3600 // 60}} минут"
        - "______________________"
